; PlatformIO project configuration
; ESP32-S3 calendar + tasks serial client (Phase 1)

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

; ArduinoJson v7. Pinned to a major version so builds stay reproducible.
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0

; Headers in include/ are on the path by default, but make it explicit.
build_flags =
    -I include
    -D DEBUG_NO_SLEEP
    -D ARDUINO_USB_CDC_ON_BOOT=0

; --- Notes ---
; * If your board enumerates differently, common alternatives are:
;     board = esp32-s3-devkitm-1
;   or set upload_port / monitor_port manually if auto-detect fails.
; * The ESP32-S3 USB-CDC serial drops during deep sleep, so the monitor
;   reconnects each wake. To keep the port alive during development, build
;   with the debug flag below (see config.h DEBUG_NO_SLEEP):
;     build_flags = -I include -D DEBUG_NO_SLEEP
